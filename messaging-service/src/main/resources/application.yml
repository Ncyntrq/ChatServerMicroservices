server:
  port: 8082

spring:
  application:
    name: messaging-service
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/chat_messaging_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

services:
  auth-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  presence-url: ${PRESENCE_SERVICE_URL:http://localhost:8083}
  server-url: ${SERVER_SERVICE_URL:http://localhost:8085}
  channel-url: ${CHANNEL_SERVICE_URL:http://localhost:8084}

# JWT verify cục bộ cho WebSocket (RBAC phi tập trung - P2.4)
jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  # ===== DISTRIBUTED TRACING =====
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318}/v1/traces

# ===== gRPC clients (net.devh) — plaintext, trỏ container theo tên service =====
grpc:
  client:
    auth-service:
      address: 'static://auth-service:9090'
      negotiation-type: plaintext
    channel-service:
      address: 'static://channel-service:9090'
      negotiation-type: plaintext
    presence-service:
      address: 'static://presence-service:9090'
      negotiation-type: plaintext
    role-service:
      address: 'static://role-service:9090'
      negotiation-type: plaintext
    server-service:
      address: 'static://server-service:9090'
      negotiation-type: plaintext

# ===== Resilience4j — fail-fast cho gRPC call (giảm lag tạo server/channel) =====
resilience4j:
  retry:
    instances:
      default:
        max-attempts: 2          # thay vì mặc định 3
        wait-duration: 200ms     # thay vì mặc định 500ms
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
