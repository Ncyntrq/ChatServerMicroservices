# Cấu hình notification-service — Spring Boot
# Dev profile: H2 in-memory, RabbitMQ localhost

server:
  port: 8088

spring:
  application:
    name: notification-service
  # Dev: H2 in-memory | Docker: MySQL (override bằng env vars)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:notificationdb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    show-sql: true
  h2:
    console:
      enabled: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  # ===== DISTRIBUTED TRACING =====
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318}/v1/traces


# ===== gRPC clients (net.devh) — plaintext, trỏ container theo tên service =====
grpc:
  client:
    server-service:
      address: 'static://server-service:9090'
      negotiation-type: plaintext

# ===== Resilience4j — fail-fast cho gRPC call (giảm lag tạo server/channel) =====
resilience4j:
  retry:
    instances:
      default:
        max-attempts: 2          # thay vì mặc định 3
        wait-duration: 200ms     # thay vì mặc định 500ms
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
