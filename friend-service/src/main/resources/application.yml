server:
  port: 8092

spring:
  main:
    lazy-initialization: true
  application:
    name: friend-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/chat_friend_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  # ===== DISTRIBUTED TRACING =====
  tracing:
    sampling:
      probability: 0.1
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318}/v1/traces

# ===== gRPC clients (net.devh) — plaintext, trỏ container theo tên service =====
grpc:
  client:
    GLOBAL:
      negotiation-type: plaintext   # mặc định an toàn cho mọi client gRPC
    user-profile-service:
      address: 'static://user-profile-service:9090'
      negotiation-type: plaintext

# ===== Resilience4j — fail-fast cho gRPC call (giảm lag tạo server/channel) =====
resilience4j:
  retry:
    instances:
      default:
        max-attempts: 2          # thay vì mặc định 3
        wait-duration: 200ms     # thay vì mặc định 500ms
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
