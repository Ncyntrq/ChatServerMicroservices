# ============================================================
#  TEMPLATE — KHÔNG apply trực tiếp, KHÔNG commit giá trị thật.
#  Chỉ liệt kê các KEY mà Secret `chatserver-secrets` cần.
#
#  PROD: tạo Secret out-of-band, KHÔNG đưa vào git:
#    JWT_SECRET=$(openssl rand -base64 48)
#    kubectl -n chatserver create secret generic chatserver-secrets \
#      --from-literal=JWT_SECRET="$JWT_SECRET" \
#      --from-literal=MYSQL_ROOT_PASSWORD="<unique>" \
#      --from-literal=SPRING_DATASOURCE_PASSWORD="<unique>" \
#      --from-literal=SPRING_RABBITMQ_USERNAME="<unique>" \
#      --from-literal=SPRING_RABBITMQ_PASSWORD="<unique>" \
#      --from-literal=MINIO_ROOT_USER="<unique>" \
#      --from-literal=MINIO_ROOT_PASSWORD="<unique>" \
#      --from-literal=MINIO_ACCESS_KEY="<unique>" \
#      --from-literal=MINIO_SECRET_KEY="<unique>"
#  Khuyến nghị: SealedSecrets / ExternalSecrets thay cho lệnh thủ công.
#  DEV (chỉ local): xem overlays/dev/secret.yaml.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: chatserver-secrets
  namespace: chatserver
type: Opaque
stringData:
  JWT_SECRET: "REPLACE-with-openssl-rand-base64-48"
  MYSQL_ROOT_PASSWORD: "REPLACE-per-environment-unique"
  SPRING_DATASOURCE_PASSWORD: "REPLACE-per-environment-unique"
  SPRING_RABBITMQ_USERNAME: "REPLACE-per-environment-unique"
  SPRING_RABBITMQ_PASSWORD: "REPLACE-per-environment-unique"
  MINIO_ROOT_USER: "REPLACE-per-environment-unique"
  MINIO_ROOT_PASSWORD: "REPLACE-per-environment-unique"
  MINIO_ACCESS_KEY: "REPLACE-per-environment-unique"
  MINIO_SECRET_KEY: "REPLACE-per-environment-unique"
