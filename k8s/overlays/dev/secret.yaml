# DEV-ONLY secret — giá trị throwaway cho cluster local (minikube/kind).
# KHÔNG dùng cho prod. Prod tạo Secret out-of-band (xem base/secret.example.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: chatserver-secrets
  namespace: chatserver
type: Opaque
stringData:
  JWT_SECRET: "dev-only-jwt-secret-key-2026-local-min-32-chars"
  MYSQL_ROOT_PASSWORD: "devpass"
  SPRING_DATASOURCE_PASSWORD: "devpass"
  SPRING_RABBITMQ_USERNAME: "guest"
  SPRING_RABBITMQ_PASSWORD: "guest"
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minioadmin"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
